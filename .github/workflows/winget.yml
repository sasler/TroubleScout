name: Publish to WinGet

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to submit to winget-pkgs (for example v1.8.1)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: winget-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Check WINGET_TOKEN secret
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -z "$WINGET_TOKEN" ]; then
            echo "::error::WINGET_TOKEN secret is not set. Add a classic Personal Access Token with public_repo scope as the WINGET_TOKEN repository secret (Settings > Secrets and variables > Actions > New repository secret), then rerun this workflow. See RELEASE-PROCESS.md for step-by-step instructions."
            exit 1
          fi

      - name: Submit manifest PR to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e
        with:
          identifier: sasler.TroubleScout
          installers-regex: '^TroubleScout-v.*-win-(x64|arm64)\.zip$'
          release-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
